version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports: ['5433:5432']
    environment:
      POSTGRES_DB: fosshack
      POSTGRES_USER: fosshack
      POSTGRES_PASSWORD: fosshack
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fosshack']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes: ['redisdata:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.7
    ports: ['7700:7700']
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_ENV: development
    volumes: ['meilisearch_data:/meili_data']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
  meilisearch_data:
